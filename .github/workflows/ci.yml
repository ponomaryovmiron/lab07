name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  linux:
    name: Linux ${{ matrix.compiler }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ clang

      - name: Configure
        run: |
          rm -rf _build
          cmake -S . -B _build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: |
          cmake --build _build --config Release

      - name: Run hello_world
        run: |
          ./_build/hello_world_application/hello_world

      - name: Run equation
        run: |
          echo "1 2 1" | ./_build/solver_application/equation

  windows:
    name: Windows ${{ matrix.compiler }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            package: mingw-w64-ucrt-x86_64-gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            package: mingw-w64-ucrt-x86_64-clang
            cc: clang
            cxx: clang++

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: |
            git
            base-devel
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            ${{ matrix.package }}

      - name: Configure
        run: |
          rm -rf _build
          cmake -S . -B _build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: |
          cmake --build _build --config Release

      - name: Run hello_world
        run: |
          ./_build/hello_world_application/hello_world.exe

      - name: Run equation
        run: |
          echo "1 2 1" | ./_build/solver_application/equation.exe
