name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build

      - name: Run solver
        run: |
          echo "3 4" | ./build/solver

  package-linux:
    name: Linux packages
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ rpm zip

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build

      - name: Build packages
        run: |
          mkdir -p artifacts
          cpack --config build/CPackConfig.cmake -G TGZ -B artifacts
          cpack --config build/CPackConfig.cmake -G ZIP -B artifacts
          cpack --config build/CPackConfig.cmake -G DEB -B artifacts
          cpack --config build/CPackConfig.cmake -G RPM -B artifacts
          ls -la artifacts

      - name: Upload Linux packages to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  package-macos:
    name: macOS package
    runs-on: macos-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build

      - name: Build DMG
        run: |
          mkdir -p artifacts
          cpack --config build/CPackConfig.cmake -G DragNDrop -B artifacts
          ls -la artifacts

      - name: Upload macOS package to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  package-windows:
    name: Windows package
    runs-on: windows-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        shell: powershell
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: powershell
        run: |
          cmake --build build --config Release

      - name: Build MSI
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          cpack --config build/CPackConfig.cmake -G WIX -B artifacts
          Get-ChildItem artifacts

      - name: Upload Windows package to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
